aid: sonic-automotive
name: Sonic Automotive
description: >-
  Sonic Automotive is one of the largest automotive retailers in the United States,
  operating 100+ franchise dealerships across 13 states representing 25+ automotive
  brands, and operating EchoPark Automotive used-vehicle stores. The company invests
  in digital retail, inventory management technology, and automotive data platforms
  to enhance customer experience across vehicle sales, service, finance, and
  insurance. Technology partners include Stripe, NETSOL, and CDK Global.
